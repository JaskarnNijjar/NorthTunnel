services:
  client_service:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
      - VPN_KEY=${VPN_KEY}
    command: ["python", "vpn_client.py"]
    cap_add:
      - NET_ADMIN
    networks: 
      - northtunnel_network

  server_service:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
      - VPN_KEY=${VPN_KEY}
    ports:
      - "8888:8888/udp" 
    command: ["python", "vpn_server.py"]
    cap_add:
      - NET_ADMIN
    networks:
      - northtunnel_network

networks:
  northtunnel_network:

services:
  client_service:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
      - VPN_KEY=${VPN_KEY}
    command: ["bash", "client_start.sh"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks: 
      - northtunnel_network

  server_service:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
      - VPN_KEY=${VPN_KEY}
    ports:
      - "8888:8888/udp"
    command: ["bash", "server_start.sh"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - northtunnel_network

networks:
  northtunnel_network:
